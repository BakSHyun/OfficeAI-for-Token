appId: com.officeai.commandcenter
productName: OfficeAI
directories:
  output: release
  buildResources: build
files:
  - out/**
  - package.json
asarUnpack:
  - "**/*.node"
npmRebuild: true
mac:
  target:
    - dmg
  category: public.app-category.productivity
win:
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish: null
