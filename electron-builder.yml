appId: com.officeai.commandcenter
productName: OfficeAI
directories:
  output: release
  buildResources: build
files:
  - out/**
  - package.json
asarUnpack:
  - "**/*.node"
npmRebuild: true
win:
  target:
    - nsis
  # 코드 사이닝: CSC_LINK, CSC_KEY_PASSWORD 환경 변수 — docs/release-guide.md
mac:
  target:
    - dmg
  category: public.app-category.productivity
  # notarization: APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
  owner: BakSHyun
  repo: OfficeAI-for-Token
